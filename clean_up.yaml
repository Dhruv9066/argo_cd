apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanup
  namespace: default
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  replicas: 4
  selector:
    matchLabels:
      app: cleanup
  template:
    metadata:
      labels:
        app: cleanup
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
